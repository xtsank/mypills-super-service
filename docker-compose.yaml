services:
  db:
    image: postgres:16-alpine
    container_name: mypills-db
    restart: always
    environment:
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - POSTGRES_DB=${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./src/internal/infra/postgres/init:/docker-entrypoint-initdb.d
  app:
    build: .
    container_name: mypills-app
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    ports:
      - "${SERVER_PORT}:8080"
    volumes:
      - ./logs:/root/logs

volumes:
  pgdata: